<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="sidebar">
            <h2>Notes Dashboard</h2>
            <ul>
                <li>Notes Overview.</li>
                <li>Notes Analytics</li>
                <li>Notes Reports</li>
                <li>Notes Settings</li>
                <li>Logout</li>
            </ul>
        </div>
        <div class="main-content">
            <h1 id="page-title">Dashboard Overview</h1>
            <div class="widget">
                <h2>Note Entry</h2>
                <input type="text" id="toDo" placeholder="Enter a task" />
                <button id="savenote">Save Note</button>
                <p id="voidentry">Please enter a task!</p>
            </div>
            <div class="widget">
                <h2>Recent Notes Tick Once Completed test</h2>
                <ul id="taskList">
                </ul>
            </div>
            
        </div>
    </div>


<script src="./script.js"></script>   
</body>


</html>
